  <!-- MAIN -->
  <main class="main-content">

    <header class="topbar">
      <h3 class="page-title">Add Study Session</h3>
    </header>

    <section class="page active">

      <div class="card">

        <form action="session_form.php" method="POST">

          <div class="form-group">
            <label class="form-label">Session Title <span class="required">*</span></label>
            <input type="text" name="title" class="form-input" placeholder="e.g. Morning Revision" required>
          </div>

          <div class="form-row-2">

            <div class="form-group">
              <label class="form-label">Subject <span class="required">*</span></label>
              <input type="text" name="subject" class="form-input" placeholder="e.g. Mathematics" required>
            </div>

            <div class="form-group">
              <label class="form-label">Date <span class="required">*</span></label>
              <input type="date" name="session_date" class="form-input" required>
            </div>

          </div>

          <div class="form-row-2">

            <div class="form-group">
              <label class="form-label">Start Time <span class="required">*</span></label>
              <input type="time" name="start_time" class="form-input" required>
            </div>

            <div class="form-group">
              <label class="form-label">End Time <span class="required">*</span></label>
              <input type="time" name="end_time" class="form-input" required>
            </div>

          </div>

          <div class="form-group">
            <label class="form-label">Location</label>
            <input type="text" name="location" class="form-input" placeholder="Library / Home / Online">
          </div>

          <div class="form-group">
            <label class="form-label">Notes</label>
            <textarea name="notes" class="form-input form-textarea" placeholder="Optional notes..."></textarea>
          </div>

          <div class="modal-footer" style="padding:0; border:none; margin-top:20px;">

            <a href="schedule.php" class="btn-secondary">Cancel</a>

            <button type="submit" class="btn-primary">
              Save Session
            </button>

          </div>

        </form>

      </div>

    </section>
